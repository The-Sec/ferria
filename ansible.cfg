[defaults]
inventory = inventory/hosts.yml
roles_path = roles
retry_files_enabled = False
stdout_callback = yaml
nocows = 1
gathering = smart
fact_caching = jsonfile
fact_caching_connection = /tmp/ferria-facts
fact_caching_timeout = 3600

[privilege_escalation]
become = True
become_method = sudo

[ssh_connection]
pipelining = True
